services:
  frontend:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # This anonymous volume is key: it keeps node_modules inside the container
    environment:
      - NODE_ENV=development
    tty: true # Keeps the container process stable
    depends_on:
      - backend
  backend:
    build: ./server
    ports:
      - "5000:5000"
    working_dir: /app
    volumes:
      # Bind mount the local server directory to the container
      - ./server:/app
      # Anonymous volume for node_modules to avoid host overrides
      - /app/node_modules
    environment:
      - PORT=5000
      # Use an absolute path inside the container to ensure reliability
      - DATABASE_URL=file:/app/prisma/dev.db
    # This ensures your schema is pushed to the DB before the app starts
    command: sh -c "npx prisma db push && npm run dev"